<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>F1 Grid Reference – 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <header>
    <h1>2026 Formula 1 Grid</h1>
    <p class="meta">
      Public reference • Last verified: <strong>21 April 2026</strong><br />
      Sources: FIA, Formula1.com, Official Team Announcements
    </p>
  </header>

  <main id="grid">Loading grid…</main>

  <footer>
    <p>
      Published by <strong>cloud99corporation-byte</strong> ·
      <a href="https://github.com/cloud99corporation-byte/f1-grid-reference">GitHub</a>
    </p>
  </footer>

  <script>
    fetch("data/2026.json")
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        data.teams.forEach(team => {
          grid.innerHTML += `
            <section class="team">
              <h2>${team.team}</h2>
              <p><strong>Power Unit:</strong> ${team.powerUnit}</p>
              <p><strong>Drivers:</strong> ${team.drivers.join(" / ")}</p>
            </section>
          `;
        });
      })
      .catch(() => {
        document.getElementById("grid").textContent =
          "Failed to load grid data.";
      });
  </script>
</body>
</html>
