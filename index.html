<main id="grid" class="grid"></main>

<script>
fetch("data/2026.json")
  .then(r => r.json())
  .then(data => {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    data.teams.forEach(team => {
      const slug = team.team.toLowerCase().replace(/\s+/g, '');
      grid.innerHTML += `
        <article class="card">
          assets/logos/${slug}.svg
          <h2>${team.team}</h2>
          <p class="engine">${team.powerUnit}</p>
          <p class="drivers">${team.drivers.join(" / ")}</p>
        </article>
      `;
    });
  });
</script>
